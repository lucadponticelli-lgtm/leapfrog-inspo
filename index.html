<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspiration Grid — Scaffold Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text-primary: #f0ede8;
    --text-secondary: #888;
    --text-muted: #555;
    --accent: #f0ede8;
    --tag-bg: #222;
    --tag-active-bg: #f0ede8;
    --tag-active-text: #0e0e0e;
    --font: 'DM Mono', 'Courier New', monospace;
    --font-sans: 'DM Sans', system-ui, sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  html { background: var(--bg); color: var(--text-primary); font-family: var(--font-sans); }

  body { min-height: 100vh; padding: 0; }

  header {
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .header-left p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: var(--font);
  }

  .header-right {
    font-family: var(--font);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  #controls {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  #search {
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    outline: none;
    width: 200px;
    letter-spacing: 0.02em;
  }

  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: var(--border-hover); }

  .tag-btn {
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }

  .tag-btn:hover { border-color: var(--border-hover); color: var(--text-secondary); }

  .tag-btn.active {
    background: var(--tag-active-bg);
    color: var(--tag-active-text);
    border-color: var(--tag-active-bg);
  }

  #count {
    font-family: var(--font);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    letter-spacing: 0.04em;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .card {
    background: var(--bg);
    display: block;
    text-decoration: none;
    transition: background 0.12s;
    overflow: hidden;
  }

  .card:hover { background: var(--surface); }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    background: var(--surface);
    overflow: hidden;
    position: relative;
  }

  .card-thumb img.screenshot {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card-thumb img.screenshot.loaded { opacity: 1; }

  .card-thumb .fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
  }

  .favicon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    opacity: 0.6;
  }

  .card-body { padding: 12px 14px 14px; }

  .card-name {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  .tag {
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 0.03em;
    padding: 2px 7px;
    border-radius: 2px;
    background: var(--tag-bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  #empty {
    display: none;
    padding: 4rem 2rem;
    text-align: center;
    font-family: var(--font);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  footer {
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Scaffold Studio — Inspiration Grid</h1>
    <p>Websites, tools, references</p>
  </div>
  <div class="header-right" id="last-updated"></div>
</header>

<div id="controls">
  <input type="text" id="search" placeholder="Search..." oninput="render()">
  <div id="tag-filters"></div>
  <span id="count"></span>
</div>

<div id="grid"></div>
<div id="empty">No results found</div>

<footer>scaffoldstudio.com</footer>

<script>
const SITES = [
  { name: "Are.na", url: "https://www.are.na", tags: ["inspiration","research","curation"], desc: "Collaborative platform for saving and organising visual references" },
  { name: "Fonts In Use", url: "https://fontsinuse.com", tags: ["typography","inspiration"], desc: "Independent archive of typography in real-world contexts" },
  { name: "Awwwards", url: "https://www.awwwards.com", tags: ["web design","inspiration"], desc: "Awards for design, creativity and innovation on the internet" },
  { name: "Liner", url: "https://getliner.com", tags: ["ai","research","productivity"], desc: "AI-powered web highlighter and research tool" },
  { name: "Perplexity", url: "https://www.perplexity.ai", tags: ["ai","search","research"], desc: "AI-powered answer engine with cited sources" },
  { name: "Mobbin", url: "https://mobbin.com", tags: ["ux","inspiration","product"], desc: "Library of mobile and web UI patterns from real products" },
  { name: "Refero", url: "https://refero.design", tags: ["ux","inspiration","product"], desc: "Curated web and app design references from real products" },
  { name: "Figma Community", url: "https://www.figma.com/community", tags: ["design","tools","templates"], desc: "Free templates, plugins and design resources" },
  { name: "Notion", url: "https://www.notion.so", tags: ["productivity","tools"], desc: "All-in-one workspace for notes, docs and databases" },
  { name: "Linear", url: "https://linear.app", tags: ["product","tools","inspiration"], desc: "Issue tracker with exceptional design — worth studying" },
  { name: "Loom", url: "https://www.loom.com", tags: ["productivity","tools"], desc: "Async video messaging for teams" },
  { name: "Readymag", url: "https://readymag.com", tags: ["web design","inspiration","tools"], desc: "Browser-based design tool for editorial and portfolio work" },
  { name: "Layers.to", url: "https://layers.to", tags: ["inspiration","portfolio","design"], desc: "Designer portfolio community and discovery platform" },
  { name: "Midjourney", url: "https://www.midjourney.com", tags: ["ai","image","generative"], desc: "AI image generation via Discord prompts" },
  { name: "Runway", url: "https://runwayml.com", tags: ["ai","video","generative"], desc: "AI video generation and creative tools" },
  { name: "Claude", url: "https://claude.ai", tags: ["ai","writing","research"], desc: "Anthropic's AI assistant for writing, analysis and coding" },
  { name: "Google Fonts", url: "https://fonts.google.com", tags: ["typography","tools"], desc: "Free open-source font library" },
  { name: "Coolors", url: "https://coolors.co", tags: ["color","tools","design"], desc: "Fast colour palette generator" },
  { name: "The Brand Identity", url: "https://the-brandidentity.com", tags: ["brand","inspiration"], desc: "Design and branding inspiration from around the world" },
  { name: "It's Nice That", url: "https://www.itsnicethat.com", tags: ["inspiration","brand","culture"], desc: "Creative industry news, projects and commissions" },
];

let activeTag = "all";

document.getElementById("last-updated").textContent = new Date().toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });

function allTags() {
  const t = new Set(["all"]);
  SITES.forEach(s => s.tags.forEach(tag => t.add(tag)));
  return [...t];
}

function filtered() {
  const q = document.getElementById("search").value.toLowerCase();
  return SITES.filter(s => {
    const matchTag = activeTag === "all" || s.tags.includes(activeTag);
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.tags.some(t => t.includes(q));
    return matchTag && matchQ;
  });
}

function faviconUrl(url) {
  try { return "https://www.google.com/s2/favicons?domain=" + new URL(url).hostname + "&sz=64"; } catch(e) { return ""; }
}

function thumbUrl(url) {
  return "https://api.thum.io/mem/imanh/crop/600x375/noanimate/" + encodeURIComponent(url);
}

function render() {
  const results = filtered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const count = document.getElementById("count");
  grid.innerHTML = "";
  empty.style.display = results.length ? "none" : "block";
  count.textContent = results.length + " sites";

  results.forEach(s => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = s.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    const img = new Image();
    img.className = "screenshot";
    img.loading = "lazy";
    img.onload = () => img.classList.add("loaded");
    img.onerror = () => { img.style.display = "none"; a.querySelector(".fallback").style.display = "flex"; };
    img.src = thumbUrl(s.url);

    a.innerHTML = `
      <div class="card-thumb">
        <div class="fallback" style="display:none">
          <img class="favicon" src="${faviconUrl(s.url)}" onerror="this.style.opacity=0" loading="lazy">
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      </div>`;

    a.querySelector(".card-thumb").insertBefore(img, a.querySelector(".fallback"));
    grid.appendChild(a);
  });
}

function renderTags() {
  const tf = document.getElementById("tag-filters");
  tf.innerHTML = allTags().map(t =>
    `<button class="tag-btn${t===activeTag?" active":""}" onclick="setTag('${t}')">${t}</button>`
  ).join("");
}

function setTag(t) {
  activeTag = t;
  renderTags();
  render();
}

renderTags();
render();
</script>
</body>
</html>
