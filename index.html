<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text-primary: #e8e4de;
    --text-secondary: #666;
    --text-muted: #444;
    --tag-bg: #1a1a1a;
    --tag-active-bg: #e8e4de;
    --tag-active-text: #0e0e0e;
    --font: 'Inter', system-ui, sans-serif;
  }
  html { background: var(--bg); color: var(--text-primary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  /* NAV — Cargo style */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 20;
  }
  .nav-brand {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: 0;
  }
  .nav-links {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .nav-links a {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.12s;
  }
  .nav-links a:hover { color: var(--text-primary); }
  .nav-links a.active { color: var(--text-primary); }

  /* SEARCH BAR */
  #controls {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    background: var(--bg);
  }
  #search {
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-primary);
    outline: none;
    width: 180px;
  }
  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: var(--border-hover); }
  #count {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* GRID */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .card {
    background: var(--bg);
    display: block;
    text-decoration: none;
    transition: background 0.12s;
    overflow: hidden;
  }
  .card:hover { background: var(--surface); }
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    background: var(--surface);
    overflow: hidden;
    position: relative;
  }
  .card-thumb img.screenshot {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card-thumb img.screenshot.loaded { opacity: 1; }
  .card-thumb .fallback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: var(--surface);
  }
  .favicon { width: 24px; height: 24px; border-radius: 5px; opacity: 0.5; }
  .card-body { padding: 11px 14px 13px; }
  .card-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 3px;
  }
  .card-name {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-kind {
    font-size: 12px;
    font-weight: 300;
    color: var(--text-secondary);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  #empty {
    display: none;
    padding: 4rem 2rem;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }
  footer {
    padding: 1.2rem 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<nav>
  <span class="nav-brand">Flower Field</span>
  <div class="nav-links">
    <a onclick="filterKind('websites')" id="nav-websites">Websites</a>
    <a onclick="filterKind('tools')" id="nav-tools">Tools</a>
    <a onclick="filterKind('references')" id="nav-references">References</a>
    <input type="text" id="search" placeholder="Search..." oninput="render()">
    <span id="count"></span>
  </div>
</nav>

<div id="grid"></div>
<div id="empty">No results found</div>

<footer>scaffoldstudio.com</footer>

<script>
// kind = "website" | "tool" | "reference"
const SITES = [
  { name: "Google Labs Pomelli", url: "https://labs.google.com/pomelli/", kind: "tool", tags: ["ai","tools","google"], desc: "Experimental AI project from Google Labs" },
  { name: "Considered Chaos", url: "https://eugenehealey.substack.com/", kind: "reference", tags: ["brand","writing","culture"], desc: "Society revealed through the lens of brand — Eugene Healey's newsletter" },
  { name: "Growth Design", url: "https://growth.design/", kind: "website", tags: ["ux","product","inspiration"], desc: "UX case studies told in comic book format" },
  { name: "Building Brand Systems", url: "https://www.notion.so/littleplains/Building-Brand-Systems-for-Humans-Agents-Today-30bbe9a1f5f680e0ab00fadae07add72", kind: "reference", tags: ["brand","ai","strategy"], desc: "Building brand systems for humans and agents — Little Plains" },
  { name: "Design Rip", url: "https://www.designrip.in/", kind: "reference", tags: ["design","inspiration","ui"], desc: "Curated design inspiration and UI references" },
  { name: "Seedance 2.0", url: "https://artlist.io/ai/models/seedance-2-0", kind: "tool", tags: ["ai","video","generation"], desc: "AI video generation model by Artlist — Seedance 2.0" },
  { name: "Three.js", url: "https://threejs.org/", kind: "tool", tags: ["3d","webgl","javascript","creative-code"], desc: "JavaScript library for 3D graphics in the browser using WebGL" },
  { name: "Design MD", url: "https://designmd.me/", kind: "reference", tags: ["design","inspiration","portfolio"], desc: "Design portfolio and reference site" },
  { name: "Vector Drop", url: "https://www.vectordrop.co.in/", kind: "website", tags: ["design","vector","resources"], desc: "Vector design resources and assets" },
  { name: "Meridius Engine", url: "https://meridiusengine.com/", kind: "tool", tags: ["3d","engine","creative"], desc: "Creative 3D rendering engine" },
  { name: "Raycast", url: "https://www.raycast.com/", kind: "tool", tags: ["productivity","macos","launcher"], desc: "Blazing-fast launcher and productivity tool for macOS" },
  { name: "Tracing Art — Getty", url: "https://www.getty.edu/tracingart/", kind: "reference", tags: ["art","history","getty","research"], desc: "Getty's Tracing Art project — provenance research resource" },
  { name: "ii.inc Agent", url: "https://agent.ii.inc/", kind: "tool", tags: ["ai","agent","automation"], desc: "AI agent interface from ii.inc" },
  { name: "Illoca", url: "https://illoca.com/", kind: "website", tags: ["design","creative","studio"], desc: "Creative studio and design work" },
  { name: "Mitte AI", url: "https://mitte.ai/", kind: "tool", tags: ["ai","design","generation"], desc: "AI-powered design and creative generation tool" },
  { name: "Jitter", url: "https://madewithjitter.com/", kind: "tool", tags: ["motion","design","animation","ui"], desc: "Motion design tool for UI animations — built in the browser" },
  { name: "Gauthmath Atlas", url: "https://www.gauthmath.com/atlas", kind: "tool", tags: ["ai","math","education"], desc: "AI-powered math learning atlas by Gauthmath" },
  { name: "Vidfield AI", url: "https://vidfield.ai/", kind: "tool", tags: ["ai","video","generation"], desc: "AI video generation platform" },
  { name: "Hovercraft", url: "https://sandwich.vision/hovercraft", kind: "website", tags: ["creative","interactive","experimental"], desc: "Experimental interactive project by Sandwich Vision" },
  { name: "Kittl", url: "https://www.kittl.com/", kind: "tool", tags: ["design","templates","branding","graphics"], desc: "Design platform for creating logos, prints, and graphics" },
  { name: "Effects — Manus", url: "https://effects.manus.space/", kind: "website", tags: ["creative","effects","visual","experimental"], desc: "Visual effects experiments by Manus" },
  { name: "WebGPU", url: "https://www.webgpu.com/", kind: "reference", tags: ["webgpu","graphics","web","api"], desc: "Resource hub for the WebGPU graphics API" },
  { name: "Spline", url: "https://spline.design/", kind: "tool", tags: ["3d","design","web","interactive"], desc: "3D design tool for creating real-time web experiences" },
  { name: "Rive", url: "https://rive.app/", kind: "tool", tags: ["animation","interactive","design","motion"], desc: "Real-time interactive animation platform for apps and the web" },
  { name: "p5.js", url: "https://p5js.org/", kind: "tool", tags: ["creative-code","javascript","art","generative"], desc: "JavaScript library for creative coding and generative art" },
  { name: "TouchDesigner", url: "https://derivative.ca/", kind: "tool", tags: ["creative-code","realtime","visual","installation"], desc: "Node-based visual programming for real-time interactive media" },
  { name: "Refero", url: "https://refero.design/", kind: "reference", tags: ["design","ui","reference","inspiration"], desc: "Real-world UI design references from top apps and products" },
  { name: "Design Systems Surf", url: "https://designsystems.surf/", kind: "reference", tags: ["design-systems","ui","reference","components"], desc: "Searchable library of design system examples and patterns" },
  { name: "Retro", url: "https://retro.app/", kind: "tool", tags: ["photo","social","nostalgia","ios"], desc: "Private photo sharing app with a disposable camera aesthetic" },
  { name: "Mobbin", url: "https://mobbin.com/discover/sites/latest", kind: "reference", tags: ["ui","reference","mobile","inspiration"], desc: "Curated UI pattern library from real apps and websites" },
  { name: "Lazy Lighting", url: "https://lazylighting.com/en", kind: "website", tags: ["lighting","design","product","interior"], desc: "Minimal lighting design studio and product collection" },
  { name: "Design Systems", url: "https://www.designsystems.com/", kind: "reference", tags: ["design-systems","strategy","ui","brand"], desc: "Publication and resource hub for design systems thinking" },
  { name: "Design Systems for Figma", url: "https://www.designsystemsforfigma.com/", kind: "reference", tags: ["figma","design-systems","components","ui"], desc: "Curated collection of design systems built for Figma" },
  { name: "Not Boring", url: "https://notbor.ing/", kind: "website", tags: ["apps","design","software","craft"], desc: "Showcase of beautifully crafted, opinionated software" },
  { name: "Immersive G", url: "https://immersive-g.com/", kind: "website", tags: ["creative","interactive","experimental","3d"], desc: "Immersive interactive and experimental creative work" },
  { name: "Late Checkout", url: "https://www.latecheckout.agency/", kind: "website", tags: ["agency","creative","brand","design"], desc: "Creative agency with a distinct brand and cultural voice" },
  { name: "LTX Studio", url: "https://app.ltx.studio/", kind: "tool", tags: ["ai","video","generation","creative"], desc: "AI-powered video creation and storytelling studio by Lightricks" },
  { name: "AI Field Guide", url: "https://www.latecheckout.agency/ai-field-guide", kind: "reference", tags: ["ai","strategy","brand","culture"], desc: "Late Checkout's guide to navigating AI as a creative and brand" },
  { name: "TopView AI", url: "https://www.topview.ai/", kind: "tool", tags: ["ai","video","ads","generation"], desc: "AI video ad creation from product URLs and raw assets" },
  { name: "Pika", url: "https://www.pika.me/", kind: "tool", tags: ["ai","video","generation","motion"], desc: "AI video generation and creative motion platform" },
  { name: "Stitch", url: "https://stitch.withgoogle.com/", kind: "tool", tags: ["ai","design","ui","google"], desc: "Google's AI-powered UI design and prototyping tool" },
  { name: "Omma", url: "https://omma.build/", kind: "tool", tags: ["ai","brand","product","strategy"], desc: "AI-native platform for product and brand building" },
  { name: "Typeface AI", url: "https://www.typeface.ai/", kind: "tool", tags: ["ai","content","brand","enterprise"], desc: "Enterprise AI for generating on-brand content at scale" },
  { name: "LottieFiles", url: "https://lottiefiles.com/", kind: "tool", tags: ["animation","motion","lottie","design"], desc: "Platform for Lottie, SVG, and dotLottie animations — create, share, deploy" },
];

let activeKind = "all";

function filterKind(kind) {
  activeKind = activeKind === kind ? "all" : kind;
  document.querySelectorAll(".nav-links a").forEach(a => a.classList.remove("active"));
  if (activeKind !== "all") {
    document.getElementById("nav-" + activeKind).classList.add("active");
  }
  render();
}

function filtered() {
  const q = document.getElementById("search").value.toLowerCase();
  return SITES.filter(s => {
    const matchKind = activeKind === "all" || s.kind === activeKind.slice(0,-1); // "websites"->"website"
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.tags.some(t => t.includes(q));
    return matchKind && matchQ;
  });
}

function faviconUrl(url) {
  try { return "https://www.google.com/s2/favicons?domain=" + new URL(url).hostname + "&sz=64"; } catch(e) { return ""; }
}

function thumb1(url) { return "https://image.thum.io/get/width/600/crop/375/" + encodeURIComponent(url); }
function thumb2(url) { return "https://s.wordpress.com/mshots/v1/" + encodeURIComponent(url) + "?w=600&h=375"; }

function render() {
  const results = filtered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const count = document.getElementById("count");
  grid.innerHTML = "";
  empty.style.display = results.length ? "none" : "block";
  count.textContent = results.length + " sites";

  results.forEach(s => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = s.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    const img = new Image();
    img.className = "screenshot";
    img.loading = "lazy";
    img.onload = () => img.classList.add("loaded");

    let attempt = 0;
    const thumbs = [thumb1(s.url), thumb2(s.url)];
    img.onerror = () => {
      attempt++;
      if (attempt < thumbs.length) { img.src = thumbs[attempt]; }
      else { img.style.display = "none"; a.querySelector(".fallback").style.display = "flex"; }
    };
    img.src = thumbs[0];

    const kindLabel = s.kind.charAt(0).toUpperCase() + s.kind.slice(1);

    a.innerHTML = `
      <div class="card-thumb">
        <div class="fallback" style="display:none">
          <img class="favicon" src="${faviconUrl(s.url)}" loading="lazy">
        </div>
      </div>
      <div class="card-body">
        <div class="card-row">
          <span class="card-name">${s.name}</span>
          <span class="card-kind">${kindLabel}</span>
        </div>
        <div class="card-desc">${s.desc}</div>
      </div>`;

    a.querySelector(".card-thumb").insertBefore(img, a.querySelector(".fallback"));
    grid.appendChild(a);
  });
}

render();
</script>
</body>
</html>
